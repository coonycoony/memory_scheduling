<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대학교 공지사항 검색</title>
<style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #222;
      padding: 40px 20px;
    }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 30px;
  }

  .header h1 {
    font-size: 32px;
    margin-bottom: 10px;
  }

  .header p {
    color: #666;
    font-size: 16px;
  }

  .search-box {
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .search-box input {
    flex: 1;
    min-width: 220px;
    padding: 14px;
    border: 1px solid #d0d7e2;
    border-radius: 10px;
    font-size: 16px;
  }

  .search-box button {
    padding: 14px 20px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
  }

  .search-box button:hover {
    background: #1d4ed8;
  }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>대학교 공지사항 검색</h1>
      <p>학교명을 입력하면 공지를 불러오고 카테고리별로 확인할 수 있습니다.</p>
    </div>

    <div class="search-box">
      <input
        type="text"
        id="universityInput"
        placeholder="예: 충북대학교"
        value="충북대학교"
      />
      <button onclick="searchNotices()">검색</button>
    </div>

    <div class="status" id="status">학교명을 입력하고 검색하세요.</div>
    <div class="notice-list" id="noticeList"></div>
  </div>
</body>
</html>
