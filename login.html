<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대학 공지 스케줄러 - 로그인</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      background: #f5f7fb;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-container {
      max-width: 420px;
      width: 100%;
      background: white;
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.06), 0 4px 12px rgba(0, 0, 0, 0.03);
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-header .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #eff6ff;
      color: #2563eb;
      border-radius: 16px;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 16px;
    }
    .login-header h1 {
      font-size: 24px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 8px;
    }
    .login-header p {
      font-size: 14px;
      color: #6b7280;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }
    .form-group label {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">🎓</div>
      <h1>반가워요!</h1>
      <p>서비스 이용을 위해 학생 정보를 입력해주세요.</p>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="userName">이름</label>
        <input type="text" id="userName" placeholder="성함을 입력해주세요" required />
      </div>
      <div class="form-group">
        <label for="userSchool">학교명</label>
        <input type="text" id="userSchool" placeholder="예: 서울대학교" required />
      </div>
      <div class="form-group">
        <label for="userBirth">생년월일</label>
        <input type="date" id="userBirth" required />
      </div>
      <button type="submit" class="btn-login">시작하기</button>
    </form>
    <div class="login-footer">
      입력하신 정보는 브라우저 내에 안전하게 저장되며,<br>
      대학교 맞춤형 공지사항 추천에만 활용됩니다.
    </div>
  </div>
</body>
</html>
