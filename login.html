<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대학 공지 스케줄러 - 로그인</title>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">🎓</div>
      <h1>반가워요!</h1>
      <p>서비스 이용을 위해 학생 정보를 입력해주세요.</p>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="userName">이름</label>
        <input type="text" id="userName" placeholder="성함을 입력해주세요" required />
      </div>
    </form>
  </div>
</body>
</html>
