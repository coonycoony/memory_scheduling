<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 공지 보관함</title>
  <style><LeftMouse>
  * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
  }

  body {
      padding: 40px 20px;
      background: #f5f7fb;
      color: #222;
  }

  .archive-container {
      max-width: 100%;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      padding: 20px;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 15px;
      align-items: start;
  }

  .left-panel {
      display: grid;
      gap: 15px;
    }

  .right-panel {
      min-width: 0;
  }

  .card {
      background: #fff;
      border: 1.5px double #e5e7eb;
      border-radius: 16px;
      padding: 14px;
  }

  .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
  }

  .header h1 {
      font-size: 18px;
      margin: 0;
  }

  .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
  }

  .selected-date,
  .helper-text,
  .status-text {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
  }

  .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      margin-bottom: 12px;
  }
  
  .form-group {
      margin-bottom: 10px;
  }

  .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
  }

  select,
  input[type="text"],
  textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 13px;
      background: #fff;
  }

  textarea {
      min-height: 64px;
      resize: vertical;
  }

  select:focus,
  input:focus,
  textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.35);
  }

  .mini-badge,
  .date-badge,
  .saved-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
  }

  .mini-badge {
      background: #eff6ff;
      color: #1d4ed8;
  }

  .date-badge {
      background: #f3f4f6;
      color: #4b5563;
  }

  .saved-badge {
      background: #ecfdf3;
      color: #15803d;
  }

  </style>
</head>

<body>
  <div class="archive-container">
    <div class="left-panel">
      <div class="card header">
        <h1>내 공지 보관함</h1>
        <a href="frontend.html" class="btn-secondary">공지 검색으로</a>
        <a href="P.html" class="btn-secondary">스케줄하러</a>
      </div>

      <div class="card">
        <div class="section-title">보관함 필터</div>
        <div class="selected-date" id="resultText">저장한 공지를 검색하고 분류별로 다시 볼 수 있어요</div>
        <div class="badge">보관된 공지 다시 보기</div>

        <div class="form-group">
          <label class="form-label" for="keywordInput">검색어</label>
          <input type="text" id="keywordInput" placeholder="제목, 메모, 부서" />
        </div>

        <div class="form-group">
          <label class="form-label" for="categoryFilter">종류</label>
          <select id="categoryFilter">
            <option value="전체">전체</option>
            <option value="장학">장학</option>
            <option value="학사">학사</option>
            <option value="입학/등록">입학/등록</option>
            <option value="취업/채용">취업/채용</option>
            <option value="모집/봉사">모집/봉사</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="savedOnlyFilter">상태</label>
          <select id="savedOnlyFilter">
            <option value="all">전체</option>
            <option value="with-date">날짜 있는 공지</option>
            <option value="urgent">오늘 이후 공지</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="sortFilter">정렬</label>
          <select id="sortFilter">
            <option value="saved-desc">최근 저장순</option>
            <option value="saved-asc">오래된 저장순</option>
            <option value="date-asc">날짜 빠른순</option>
            <option value="date-desc">날짜 늦은순</option>
          </select>
        </div>

        <div class="button-row">
          <button type="button" class="btn-primary" id="seedBtn">샘플 추가</button>
          <button type="button" class="btn-secondary" id="resetBtn">필터 초기화</button>
          <button type="button" class="btn-danger" id="clearBtn">전체 비우기</button>
        </div>

        <div class="event-list" id="savedList"></div>
      </div>

      <div class="card">
        <div class="section-title">보관함 요약</div>
        <div class="summary-list">
          <div class="summary-item">전체 공지<strong id="summaryTotal">0</strong></div>
          <div class="summary-item">장학 공지<strong id="summaryScholarship">0</strong></div>
          <div class="summary-item">날짜 있는 공지<strong id="summaryWithDate">0</strong></div>
          <div class="summary-item">오늘 이후 공지<strong id="summaryUpcoming">0</strong></div>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="card archive-board">
        <div class="archive-header">
          <div class="archive-title">보관한 공지 카드</div>
          <div class="status-text" id="status">보관함을 불러오는 중입니다.</div>
        </div>
        <div class="archive-grid" id="noticeGrid"></div>
      </div>
    </div>
  </div>

</body>
