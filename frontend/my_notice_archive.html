<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 공지 보관함</title>
  <style><LeftMouse>
  * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
  }

  body {
      padding: 40px 20px;
      background: #f5f7fb;
      color: #222;
  }

  .archive-container {
      max-width: 100%;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      padding: 20px;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 15px;
      align-items: start;
  }

  @media (max-width: 900px) {
      .archive-container {
        grid-template-columns: 1fr;
      }
  }

  .left-panel {
      display: grid;
      gap: 15px;
    }

  .right-panel {
      min-width: 0;
  }

  .card {
      background: #fff;
      border: 1.5px double #e5e7eb;
      border-radius: 16px;
      padding: 14px;
  }

  .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
  }

  .header h1 {
      font-size: 18px;
      margin: 0;
  }

  .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
  }

  .selected-date,
  .helper-text,
  .status-text {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
  }

  .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      margin-bottom: 12px;
  }
  
  .form-group {
      margin-bottom: 10px;
  }

  .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
  }

  select,
  input[type="text"],
  textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 13px;
      background: #fff;
  }

  textarea {
      min-height: 64px;
      resize: vertical;
  }

  select:focus,
  input:focus,
  textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.35);
  }
  
  .button-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
  }

  .btn-primary,
  .btn-secondary,
  .btn-danger {
      border: none;
      border-radius: 999px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
  }

  .btn-primary {
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      padding: 9px 12px;
      font-weight: 600;
  }

  .btn-primary:hover {
      background: #1d4ed8;
  }

  .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      font-size: 13px;
      padding: 8px 10px;
  }

  .btn-secondary:hover {
      background: #e5e7eb;
  }

  .btn-danger {
      background: #fee2e2;
      color: #b91c1c;
      font-size: 13px;
      padding: 8px 10px;
  }

  .btn-danger:hover {
      background: #fecaca;
  }

  .summary-list {
      display: grid;
      gap: 8px;
  }

  .summary-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 12px;
      background: #f9fafb;
  }

  .summary-item strong {
      display: block;
      font-size: 18px;
      color: #111827;
      margin-top: 4px;
  }
  
  .event-list {
      margin-top: 14px;
      max-height: 660px;
      overflow-y: auto;
      padding-right: 4px;
      display: grid;
      gap: 8px;
  }

  .event-item {
      padding: 10px 12px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      font-size: 13px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
  }

  .event-main {
      flex: 1;
      min-width: 0;
  }

  .event-type-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      margin-bottom: 4px;
  }

  .event-type-pill.scholarship {
      background: #fff7ed;
      color: #c2410c;
  }

  .event-type-pill.academic {
      background: #ecfeff;
      color: #0f766e;
  }

  .event-type-pill.job {
      background: #f5f3ff;
      color: #7c3aed;
  }

  .event-type-pill.etc {
      background: #ecfdf3;
      color: #15803d;
  }

  .event-title {
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.5;
  }

  .event-time,
  .event-memo,
  .event-meta {
      font-size: 12px;
      color: #4b5563;
      line-height: 1.55;
      margin-top: 3px;
  }

  .empty-text {
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
      padding: 16px 4px;
  }
  
  .archive-board {
      padding: 16px;
  }

  .archive-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
  }

  .archive-title {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
  }

  .archive-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
  }

  @media (max-width: 1100px) {
      .archive-grid {
        grid-template-columns: 1fr;
      }
  }
  
  .notice-card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
      display: grid;
      gap: 10px;
  }

  .notice-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
  }

  .pill-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
  }

  .mini-badge,
  .date-badge,
  .saved-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
  }

  .mini-badge {
      background: #eff6ff;
      color: #1d4ed8;
  }

  .date-badge {
      background: #f3f4f6;
      color: #4b5563;
  }

  .saved-badge {
      background: #ecfdf3;
      color: #15803d;
  }

  .notice-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
  }

  .notice-title a {
      color: #111827;
      text-decoration: none;
  }

  .notice-title a:hover {
      color: #2563eb;
      text-decoration: underline;
  }

  .notice-memo {
      font-size: 12px;
      color: #4b5563;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      line-height: 1.6;
  }

  .notice-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
  }

  </style>
</head>

<body>
  <div class="archive-container">
    <div class="left-panel">
      <div class="card header">
        <h1>내 공지 보관함</h1>
        <a href="frontend.html" class="btn-secondary">공지 검색으로</a>
        <a href="P.html" class="btn-secondary">스케줄하러</a>
      </div>

      <div class="card">
        <div class="section-title">보관함 필터</div>
        <div class="selected-date" id="resultText">저장한 공지를 검색하고 분류별로 다시 볼 수 있어요</div>
        <div class="badge">보관된 공지 다시 보기</div>

        <div class="form-group">
          <label class="form-label" for="keywordInput">검색어</label>
          <input type="text" id="keywordInput" placeholder="제목, 메모, 부서" />
        </div>

        <div class="form-group">
          <label class="form-label" for="categoryFilter">종류</label>
          <select id="categoryFilter">
            <option value="전체">전체</option>
            <option value="장학">장학</option>
            <option value="학사">학사</option>
            <option value="입학/등록">입학/등록</option>
            <option value="취업/채용">취업/채용</option>
            <option value="모집/봉사">모집/봉사</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="savedOnlyFilter">상태</label>
          <select id="savedOnlyFilter">
            <option value="all">전체</option>
            <option value="with-date">날짜 있는 공지</option>
            <option value="urgent">오늘 이후 공지</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="sortFilter">정렬</label>
          <select id="sortFilter">
            <option value="saved-desc">최근 저장순</option>
            <option value="saved-asc">오래된 저장순</option>
            <option value="date-asc">날짜 빠른순</option>
            <option value="date-desc">날짜 늦은순</option>
          </select>
        </div>

        <div class="button-row">
          <button type="button" class="btn-primary" id="seedBtn">샘플 추가</button>
          <button type="button" class="btn-secondary" id="resetBtn">필터 초기화</button>
          <button type="button" class="btn-danger" id="clearBtn">전체 비우기</button>
        </div>

        <div class="event-list" id="savedList"></div>
      </div>

      <div class="card">
        <div class="section-title">보관함 요약</div>
        <div class="summary-list">
          <div class="summary-item">전체 공지<strong id="summaryTotal">0</strong></div>
          <div class="summary-item">장학 공지<strong id="summaryScholarship">0</strong></div>
          <div class="summary-item">날짜 있는 공지<strong id="summaryWithDate">0</strong></div>
          <div class="summary-item">오늘 이후 공지<strong id="summaryUpcoming">0</strong></div>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="card archive-board">
        <div class="archive-header">
          <div class="archive-title">보관한 공지 카드</div>
          <div class="status-text" id="status">보관함을 불러오는 중입니다.</div>
        </div>
        <div class="archive-grid" id="noticeGrid"></div>
      </div>
    </div>
  </div>
  
  <script>
  // =========================
  // 1. 상태(State)     
  // =========================
  const state = {
    fallbackItems: []
  };
  
  // =========================
  // 2. 상수(Constants)
  // =========================
  const STORAGE_KEY = 'noticeArchiveItems';

  // =========================
  // 3. DOM 유틸 / DOM 참조
  // =========================
  const els = {
    keywordInput: document.getElementById('keywordInput'),
    categoryFilter: document.getElementById('categoryFilter'),
    savedOnlyFilter: document.getElementById('savedOnlyFilter'),
    sortFilter: document.getElementById('sortFilter'),
    seedBtn: document.getElementById('seedBtn'),
    resetBtn: document.getElementById('resetBtn'),
    clearBtn: document.getElementById('clearBtn'),
    savedList: document.getElementById('savedList'),
    noticeGrid: document.getElementById('noticeGrid'),
    status: document.getElementById('status'),
    resultText: document.getElementById('resultText'),
    summaryTotal: document.getElementById('summaryTotal'),
    summaryScholarship: document.getElementById('summaryScholarship'),
    summaryWithDate: document.getElementById('summaryWithDate'),
    summaryUpcoming: document.getElementById('summaryUpcoming')
  };

  // =========================
  // 4. 유틸 함수
  // =========================
  function parseLocalDate(dateStr) {
    if (!dateStr || typeof dateStr !== 'string') return null;
    const match = dateStr.trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!match) return null;
    const [, y, m, d] = match;
    return new Date(Number(y), Number(m) - 1, Number(d));
  }

  function getTodayStart() {
    const now = new Date();
    return new Date(now.getFullYear(), now.getMonth(), now.getDate());
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttribute(value) {
    return String(value ?? '').replace(/"/g, '&quot;');
  }
  
  // =========================
  // 5. Data Helpers
  // =========================
  function getStoredItems() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return state.fallbackItems;
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : state.fallbackItems;
    } catch (error) {
      return state.fallbackItems;
    }
  }

  function setStoredItems(items) {
    state.fallbackItems = items;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    } catch (error) {}
  }
  
  function normalizeItem(item) {
    return {
      id: item.id || `${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
      title: item.title || '제목 없음',
      url: item.url || '#',
      category: item.category || '기타',
      source_category: item.source_category || item.subCategory || '기타',
      department: item.department || '',
      university: item.university || '',
      date: item.date || '',
      memo: item.memo || '',
      savedAt: item.savedAt || new Date().toISOString()
    };
  }

  function buildScheduleUrl(item) {
    const params = new URLSearchParams({
      title: item.title || '',
      category: item.category || '기타',
      subCategory: item.source_category || '기타',
      url: item.url || '',
      memo: item.memo || ''
    });
    return `schedule_page-1.html?${params.toString()}`;
  }

  function getPillClass(category) {
    if (category === '장학') return 'scholarship';
    if (category === '학사') return 'academic';
    if (category === '취업/채용') return 'job';
    return 'etc';
  }

  function matchesKeyword(item, keyword) {
    const textBlob = [
      item.title,
      item.department,
      item.memo,
      item.source_category,
      item.university
    ].join(' ').toLowerCase();

    return keyword ? textBlob.includes(keyword) : true;
  }

  function matchesCategory(item, category) {
    return category === '전체' ? true : item.category === category;
  }

  function matchesSavedMode(item, mode) {
    const dateObj = parseLocalDate(item.date);
    const today = getTodayStart();

    if (mode === 'all') return true;
    if (mode === 'with-date') return Boolean(dateObj);
    if (mode === 'urgent') return Boolean(dateObj && dateObj >= today);
    return true;
  }

  function sortItems(items, sortType) {
    return [...items].sort((a, b) => {
      if (sortType === 'saved-asc') {
        return new Date(a.savedAt) - new Date(b.savedAt);
      }

      if (sortType === 'date-asc') {
        const aDate = parseLocalDate(a.date)?.getTime() ?? Number.MAX_SAFE_INTEGER;
        const bDate = parseLocalDate(b.date)?.getTime() ?? Number.MAX_SAFE_INTEGER;
        return aDate - bDate;
      }

      if (sortType === 'date-desc') {
        const aDate = parseLocalDate(a.date)?.getTime() ?? 0;
        const bDate = parseLocalDate(b.date)?.getTime() ?? 0;
        return bDate - aDate;
      }

      return new Date(b.savedAt) - new Date(a.savedAt);
    });
  }

  function getAllItems() {
    return getStoredItems().map(normalizeItem);
  }

  function getFilteredItems() {
    const keyword = els.keywordInput.value.trim().toLowerCase();
    const category = els.categoryFilter.value;
    const mode = els.savedOnlyFilter.value;
    const sortType = els.sortFilter.value;

    const filtered = getAllItems()
      .filter((item) => matchesKeyword(item, keyword))
      .filter((item) => matchesCategory(item, category))
      .filter((item) => matchesSavedMode(item, mode));

    return sortItems(filtered, sortType);
  }
  
  // =========================
  // 6. 렌더링
  // =========================
  function renderSummary(items) {
    const today = getTodayStart();

    const scholarshipCount = items.filter((item) => item.category === '장학').length;
    const withDateCount = items.filter((item) => parseLocalDate(item.date)).length;
    const upcomingCount = items.filter((item) => {
      const dateObj = parseLocalDate(item.date);
      return dateObj && dateObj >= today;
    }).length;

    els.summaryTotal.textContent = String(items.length);
    els.summaryScholarship.textContent = String(scholarshipCount);
    els.summaryWithDate.textContent = String(withDateCount);
    els.summaryUpcoming.textContent = String(upcomingCount);
  }

  function renderSavedList(items) {
    if (!items.length) {
      els.savedList.innerHTML = `<div class="empty-text">저장된 공지가 없습니다.</div>`;
      return;
    }

    els.savedList.innerHTML = items.map((item) => `
      <div class="event-item">
        <div class="event-main">
          <div class="event-type-pill ${getPillClass(item.category)}">${escapeHtml(item.category)}</div>
          <div class="event-title">${escapeHtml(item.title)}</div>
          <div class="event-time">${escapeHtml(item.date || '날짜 없음')} · ${escapeHtml(item.source_category || '세부항목 없음')}</div>
          <div class="event-meta">${escapeHtml(item.department || '부서 없음')} ${item.university ? `| ${escapeHtml(item.university)}` : ''}</div>
        </div>
        <button type="button" class="btn-secondary" data-remove-id="${escapeAttribute(item.id)}">삭제</button>
      </div>
    `).join('');
  }

  function renderNoticeGrid(items) {
    if (!items.length) {
      els.noticeGrid.innerHTML = `<div class="empty-text">조건에 맞는 공지가 없습니다.</div>`;
      return;
    }

    els.noticeGrid.innerHTML = items.map((item) => `
      <div class="notice-card">
        <div class="notice-top">
          <div class="pill-row">
            <span class="mini-badge">${escapeHtml(item.category)}</span>
            <span class="date-badge">${escapeHtml(item.date || '날짜 없음')}</span>
            <span class="saved-badge">보관 완료</span>
          </div>
          <span class="status-text">${escapeHtml(item.university || '')}</span>
        </div>

        <div class="notice-title">
          <a href="${escapeAttribute(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a>
        </div>

        <div class="event-meta">세부항목: ${escapeHtml(item.source_category || '없음')} · 부서: ${escapeHtml(item.department || '없음')}</div>

        <div class="notice-memo">${escapeHtml(item.memo || '메모가 없습니다. 저장 이유를 남겨두면 나중에 다시 확인하기 쉽습니다.')}</div>

        <div class="notice-actions">
          <a class="btn-primary" href="${escapeAttribute(item.url)}" target="_blank" rel="noopener noreferrer">원문 보기</a>
          <a class="btn-secondary" href="${escapeAttribute(buildScheduleUrl(item))}">달력에 가져가기</a>
          <button type="button" class="btn-danger" data-remove-id="${escapeAttribute(item.id)}">보관함에서 제거</button>
        </div>
      </div>
    `).join('');
  }

  function renderStatus(allItems, filteredItems) {
    if (!allItems.length) {
      els.status.textContent = '아직 저장된 공지가 없습니다. 샘플을 추가하거나 공지 검색 페이지에서 저장하세요.';
      els.resultText.textContent = '보관함이 비어 있습니다.';
      return;
    }

    els.status.textContent = `필터 결과 ${filteredItems.length}건을 표시 중입니다.`;
    els.resultText.textContent = `전체 ${allItems.length}건 중 현재 조건에 맞는 공지 ${filteredItems.length}건`;
  }

  function bindRemoveButtons() {
    document.querySelectorAll('[data-remove-id]').forEach((button) => {
      button.addEventListener('click', () => handleRemoveItem(button.dataset.removeId));
    });
  }

  function renderArchive() {
    const allItems = getAllItems();
    const filteredItems = getFilteredItems();

    renderSummary(allItems);
    renderSavedList(allItems);
    renderNoticeGrid(filteredItems);
    renderStatus(allItems, filteredItems);
    bindRemoveButtons();
  }
  
  // =========================
  // 7. 핸들러
  // =========================
  function handleSeedSampleItems() {
    const existing = getStoredItems();
    if (existing.length) {
      els.status.textContent = '이미 저장된 공지가 있습니다.';
      renderArchive();
      return;
    }

    const sampleItems = [
      {
        title: '2026학년도 2학기 국가장학금 2차 신청 안내',
        url: 'https://example.com/scholarship',
        category: '장학',
        source_category: '국가장학',
        department: '학생과',
        university: '충북대학교',
        date: '2026-06-12',
        memo: '서류 제출 여부와 소득구간 확인 필요',
        savedAt: '2026-06-01T09:20:00'
      },
      {
        title: '하계 계절수업 수강신청 변경 기간 안내',
        url: 'https://example.com/class',
        category: '학사',
        source_category: '수강신청',
        department: '학사지원과',
        university: '충북대학교',
        date: '2026-06-05',
        memo: '겹치는 시간표 다시 체크',
        savedAt: '2026-06-01T10:10:00'
      },
      {
        title: '학생생활관 추가 모집 공고',
        url: 'https://example.com/dorm',
        category: '모집/봉사',
        source_category: '생활관',
        department: '학생생활관',
        university: '충북대학교',
        date: '2026-06-20',
        memo: '입사 가능 기간과 준비물 확인',
        savedAt: '2026-06-01T11:00:00'
      }
    ].map(normalizeItem);

    setStoredItems(sampleItems);
    els.status.textContent = '샘플 공지 3건을 보관함에 추가했습니다.';
    renderArchive();
  }

  function handleRemoveItem(id) {
    const nextItems = getStoredItems().filter((item) => item.id !== id);
    setStoredItems(nextItems);
    els.status.textContent = '선택한 공지를 삭제했습니다.';
    renderArchive();
  }

  function handleClearArchive() {
    if (!confirm('보관함을 모두 비울까요?')) return;
    setStoredItems([]);
    els.status.textContent = '보관함을 비웠습니다.';
    renderArchive();
  }

  function handleResetFilters() {
    els.keywordInput.value = '';
    els.categoryFilter.value = '전체';
    els.savedOnlyFilter.value = 'all';
    els.sortFilter.value = 'saved-desc';
    renderArchive();
  }

  function handleStorageSync(event) {
    if (event.key !== STORAGE_KEY) return;
    els.status.textContent = '다른 페이지에서 보관함이 변경되어 목록을 다시 불러왔습니다.';
    renderArchive();
  }

  </script>
</body>
