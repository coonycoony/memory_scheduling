<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대학교 공지사항 검색</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #222;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 16px;
    }

    /* 검색 박스 내 select 스타일 추가 */
    .search-box {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-box select {
      flex: 1;
      min-width: 200px;
      padding: 14px;
      border: 1px solid #d0d7e2;
      border-radius: 10px;
      font-size: 16px;
      background-color: white;
      cursor: pointer;
      appearance: none; /* 브라우저 기본 화살표 숨기기 */
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 16px;
      padding-right: 40px;
    }

    .search-box select:disabled {
      background-color: #f3f4f6;
      cursor: not-allowed;
      color: #9ca3af;
    }

    .search-box button {
      padding: 14px 24px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      min-width: 100px;
    }

    .search-box button:hover {
      background: #1d4ed8;
    }

    .filter-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
      justify-content: center;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 1px solid #d0d7e2;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      color: #444;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      background: #f0f4f8;
    }

    .filter-btn.active {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
      font-weight: bold;
    }

    .status {
      margin-bottom: 16px;
      color: #444;
      font-size: 15px;
      font-weight: bold;
    }

    .notice-list {
      display: grid;
      gap: 16px;
    }

    .notice-card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      transition: transform 0.15s ease;
    }

    .notice-card:hover {
      transform: translateY(-2px);
    }

    .notice-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e8f0ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: bold;
    }

    .title {
      font-size: 19px;
      font-weight: bold;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .title a {
      text-decoration: none;
      color: #111827;
    }

    .title a:hover {
      text-decoration: underline;
      color: #2563eb;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      color: #666;
      font-size: 14px;
    }

    .empty {
      background: white;
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      color: #666;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 8px 12px;
      border: 1px solid #d0d7e2;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: #444;
      transition: all 0.2s;
    }

    .page-btn:hover {
      background: #f0f4f8;
    }

    .page-btn.active {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
      font-weight: bold;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .sort-select {
      padding: 8px 12px;
      border: 1px solid #d0d7e2;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      background-color: white;
    }
    @media (max-width: 640px) {
      .header h1 {
        font-size: 26px;
      }
      .search-box {
        flex-direction: column;
      }
      .search-box select, .search-box button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>대학교 공지사항 검색</h1>
        <p>학교와 게시판을 선택하여 공지를 불러오고 카테고리별로 확인할 수 있습니다.</p><button onclick="location.href='schedule_page.html'" style="margin-top: 16px; padding: 12px 24px; background: #10b981; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);">
      📅 내 스케줄러 관리하기
    </button>
    </div>

    <div class="search-box">
      <select id="universitySelect" onchange="handleUniversityChange()">
        <option value="">학교 목록을 불러오는 중...</option>
      </select>
      
      <select id="boardSelect" disabled>
        <option value="">게시판 선택 (전체)</option>
      </select>
      
      <button onclick="searchNotices()">검색</button>
    </div>

    <div class="filter-container" id="filterContainer">
      <button class="filter-btn active" onclick="applyFilter('전체')">전체</button>
      <button class="filter-btn" onclick="applyFilter('일반')">일반</button>
      <button class="filter-btn" onclick="applyFilter('장학')">장학</button>
      <button class="filter-btn" onclick="applyFilter('학사')">학사</button>
      <button class="filter-btn" onclick="applyFilter('입학/등록')">입학/등록</button>
      <button class="filter-btn" onclick="applyFilter('취업/채용')">취업/채용</button>
      <button class="filter-btn" onclick="applyFilter('공모전/대회')">공모전/대회</button>
      <button class="filter-btn" onclick="applyFilter('모집/봉사')">모집/봉사</button>
      <button class="filter-btn" onclick="applyFilter('시설/행정')">시설/행정</button>
      <button class="filter-btn" onclick="applyFilter('안전')">안전</button>
      <button class="filter-btn" onclick="applyFilter('기타')">기타</button>
    </div>

    <div class="status" id="status">
      <div class="status" id="status">학교를 선택하고 검색하세요.</div>
      <select id="sortSelect" class="sort-select" onchange="handleSortChange()">
        <option value="desc">최신순</option>
        <option value="asc">과거순</option>
      </select>
    </div>
    <div class="notice-list" id="noticeList"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    const API_BASE_URL = "http://127.0.0.1:8000";
    const ITEMS_PER_PAGE = 30;
    
    let allNotices = [];
    let currentFilteredNotices = [];
    let currentCategory = '전체';
    let hasSearched = false;
    let currentPage = 1;
    let currentPage = 1;
    let currentSort = 'desc';

    window.onload = async function() {
      await loadUniversities();
      
      const savedSession = localStorage.getItem("userSession");
      if (savedSession) {
        try {
          const user = JSON.parse(savedSession);
          const univSelect = document.getElementById("universitySelect");
          const status = document.getElementById("status");
          
          let schoolExists = false;
          for (let i = 0; i < univSelect.options.length; i++) {
            if (univSelect.options[i].value === user.school) {
              schoolExists = true;
              break;
            }
          }

          if (schoolExists) {
            univSelect.value = user.school;
            status.textContent = `👋 ${user.name}님 환영합니다! ${user.school} 게시판을 선택해 검색해 보세요.`;
            
            handleUniversityChange();
          } else {
            status.textContent = `👋 ${user.name}님 환영합니다! (아쉽게도 입력하신 '${user.school}'은 아직 지원하지 않습니다.)`;
          }
        } catch (error) {
          console.error("세션 데이터를 읽는 중 오류가 발생했습니다.", error);
        }
      }
    };

    async function loadUniversities() {
      const univSelect = document.getElementById("universitySelect");
      try {
        const response = await fetch(`${API_BASE_URL}/universities`);
        if (response.ok) {
          const universities = await response.json();
          univSelect.innerHTML = `<option value="">학교를 선택하세요</option>` + 
            universities.map(u => `<option value="${escapeAttribute(u)}">${escapeHtml(u)}</option>`).join("");
        } else {
          throw new Error("API 응답 실패");
        }
      } catch (error) {
        console.error("대학교 목록을 불러오지 못했습니다.", error);
        const fallbackList = ['충북대학교', '전남대학교', '충남대학교'];
        univSelect.innerHTML = `<option value="">학교를 선택하세요</option>` + 
            fallbackList.map(u => `<option value="${escapeAttribute(u)}">${escapeHtml(u)}</option>`).join("");
      }
    }

    async function handleUniversityChange() {
      const univSelect = document.getElementById("universitySelect");
      const boardSelect = document.getElementById("boardSelect");
      const selectedUniv = univSelect.value;

      if (!selectedUniv) {
        boardSelect.innerHTML = `<option value="">게시판 선택 (전체)</option>`;
        boardSelect.disabled = true;
        return;
      }

      boardSelect.innerHTML = `<option value="">게시판 목록을 불러오는 중...</option>`;
      boardSelect.disabled = true;

      try {
        const response = await fetch(`${API_BASE_URL}/boards?university=${encodeURIComponent(selectedUniv)}`);
        if (response.ok) {
          const boards = await response.json();
          boardSelect.innerHTML = `<option value="">게시판 선택 (전체)</option>` + 
            boards.map(b => `<option value="${escapeAttribute(b)}">${escapeHtml(b)}</option>`).join("");
          
          boardSelect.disabled = false;
        } else {
          throw new Error("게시판 API 응답 실패");
        }
      } catch (error) {
        console.error("게시판 목록을 불러오지 못했습니다.", error);
        boardSelect.innerHTML = `<option value="">게시판을 불러오지 못했습니다 (전체 검색)</option>`;
        boardSelect.disabled = false;
      }
    }

    async function searchNotices() {
      const university = document.getElementById("universitySelect").value;
      const board = document.getElementById("boardSelect").value;
      const status = document.getElementById("status");
      const noticeList = document.getElementById("noticeList");
      const pagination = document.getElementById("pagination");

      if (!university) {
        status.textContent = "학교를 먼저 선택해주세요.";
        noticeList.innerHTML = "";
        pagination.innerHTML = "";
        return;
      }

      status.textContent = "공지사항을 불러오는 중입니다...";
      noticeList.innerHTML = "";
      pagination.innerHTML = "";
      hasSearched = true;
      currentPage = 1;

      try {
        let url = `${API_BASE_URL}/notices?university=${encodeURIComponent(university)}`;
        if (board) {
          url += `&board=${encodeURIComponent(board)}`;
        }

        const response = await fetch(url);

        if (!response.ok) {
          throw new Error("서버 응답 오류");
        }

        const notices = await response.json();
        
        if (!Array.isArray(notices) || notices.length === 0) {
          allNotices = [];
          status.textContent = `${university} 공지사항이 없습니다.`;
          noticeList.innerHTML = `
            <div class="empty">
              검색 결과가 없습니다.<br />
              선택한 학교 또는 게시판에 데이터가 있는지 확인해주세요.
            </div>
          `;
          return;
        }

        allNotices = notices;
        applyFilter(currentCategory);

      } catch (error) {
        console.error(error);
        status.textContent = "공지사항을 불러오지 못했습니다.";
        noticeList.innerHTML = `
          <div class="empty">
            서버 연결에 실패했습니다.<br />
            백엔드 실행 여부와 API 주소를 확인해주세요.
          </div>
        `;
      }
    }

    function applyFilter(category) {
      currentCategory = category;
      currentPage = 1;

      const buttons = document.querySelectorAll('.filter-btn');
      buttons.forEach(btn => {
        if (btn.textContent.trim() === category) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      if (!hasSearched) return;

      currentFilteredNotices = category === '전체' 
        ? allNotices 
        : allNotices.filter(n => (n.category || '기타') === category);

      const status = document.getElementById("status");
      const university = document.getElementById("universitySelect").value;
      const board = document.getElementById("boardSelect").value;
      
      const targetName = board ? `${university} - ${board}` : university;
      status.textContent = `${targetName} '${category}' 공지 ${currentFilteredNotices.length}건을 찾았습니다.`;

      sortNotices();
    }

    function renderPage() {
      const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
      const endIndex = startIndex + ITEMS_PER_PAGE;
      const paginatedNotices = currentFilteredNotices.slice(startIndex, endIndex);

      renderNotices(paginatedNotices);
      renderPagination(currentFilteredNotices.length);
    }

    function changePage(pageNumber) {
      currentPage = pageNumber;
      renderPage();

      const statusElement = document.getElementById("status");
      statusElement.scrollIntoView({ behavior: 'smooth' });
    }

    function renderPagination(totalItems) {
      const paginationContainer = document.getElementById("pagination");
      const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);

      if (totalPages <= 1) {
        paginationContainer.innerHTML = "";
        return;
      }

      let paginationHtml = "";
      for (let i = 1; i <= totalPages; i++) {
        const isActive = i === currentPage ? 'active' : '';
        paginationHtml += `<button class="page-btn ${isActive}" onclick="changePage(${i})">${i}</button>`;
      }
      
      paginationContainer.innerHTML = paginationHtml;
    }

    function renderNotices(notices) {
      const noticeList = document.getElementById("noticeList");
      
      if (notices.length === 0) {
        noticeList.innerHTML = `
          <div class="empty">
            해당 카테고리의 공지사항이 없습니다.
          </div>
        `;
        return;
      }

      noticeList.innerHTML = notices.map(notice => `
        <div class="notice-card">
          <div class="notice-top">
            <span class="badge">${escapeHtml(notice.category || "기타")}</span>
            <span>${escapeHtml(notice.university || "")}</span>
          </div>
          <div class="title">
            <a href="${escapeAttribute(notice.url || "#")}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(notice.title || "제목 없음")}
            </a>
          </div>
          <div class="meta">
            <span>원본 분류: ${escapeHtml(notice.source_category || "없음")}</span>
            <span>부서: ${escapeHtml(notice.department || "없음")}</span>
            <span>작성일: ${escapeHtml(notice.date || "없음")}</span>
          </div>
        </div>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttribute(value) {
      return String(value).replace(/\"/g, "&quot;");
    }
    function handleSortChange() {
      currentSort = document.getElementById("sortSelect").value;
      currentPage = 1;
      sortNotices();
    }

    function sortNotices() {
      if (currentSort === 'desc') {
        currentFilteredNotices.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
      } else {
        currentFilteredNotices.sort((a, b) => new Date(a.date || 0) - new Date(b.date || 0));
      }
      renderPage();
    }
  </script>
</body>
</html>
